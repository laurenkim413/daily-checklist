<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f3; --surface:#fff; --surface-hover:#f9f9f7;
  --border:#e8e6e0; --border-light:#f0eeea;
  --text-primary:#1a1a1a; --text-muted:#a8a49c;
  --accent:#2d5a3d; --accent-light:#e8f0eb; --accent-mid:#4a8760;
  --danger:#c4543a; --repeat-color:#5a6fa8; --repeat-bg:#eef1f8;
  --progress-bg:#e8e6e0;
  --shadow-sm:0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.07);
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding:40px 20px 80px}
.container{max-width:640px;margin:0 auto}

/* Header */
.header{margin-bottom:28px;animation:fadeUp .5s ease both}
.date-label{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.date-display{font-family:'Nanum Gothic',sans-serif;font-size:clamp(24px,4.5vw,36px);font-weight:800;line-height:1.2;letter-spacing:-.02em}
.date-display em{font-style:normal;color:var(--accent-mid)}

/* Tab bar */
.tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px;margin-bottom:24px;box-shadow:var(--shadow-sm);animation:fadeUp .5s .05s ease both}
.tab-btn{flex:1;padding:9px 12px;background:none;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn:hover{color:var(--text-primary);background:var(--bg)}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(45,90,61,.25)}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeUp .3s ease both}

/* Progress */
.progress-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;box-shadow:var(--shadow-sm)}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.progress-title{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.progress-stats{display:flex;align-items:baseline;gap:4px}
.progress-pct{font-family:'Nanum Gothic',sans-serif;font-size:28px;font-weight:800;color:var(--accent);line-height:1}
.progress-pct-sym{font-size:14px;color:var(--accent-mid);font-weight:500}
.progress-count{font-size:12px;color:var(--text-muted);margin-left:8px}
.progress-bar-wrap{height:6px;background:var(--progress-bg);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-mid),var(--accent));border-radius:99px;transition:width .6s cubic-bezier(.16,1,.3,1)}

/* Add form */
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.form-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px}
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.form-row-2{display:flex;gap:8px;align-items:center;margin-top:8px}
.input-time{flex:0 0 90px;padding:10px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-primary);cursor:pointer;outline:none;transition:border-color .2s,background .2s;appearance:none;-webkit-appearance:none;text-align:center}
.input-time:focus{border-color:var(--accent-mid);background:var(--surface)}
.input-task{flex:1;min-width:120px;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-primary);outline:none;transition:border-color .2s,background .2s}
.input-task::placeholder{color:var(--text-muted)}
.input-task:focus{border-color:var(--accent-mid);background:var(--surface)}

/* Category selector in form */
.cat-select-wrap{flex:0 0 auto;position:relative}
.cat-select{padding:10px 30px 10px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-primary);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s,background .2s;min-width:100px}
.cat-select:focus{border-color:var(--accent-mid);background:var(--surface)}
.cat-select-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:10px;color:var(--text-muted)}

.repeat-toggle{flex:0 0 auto;display:flex;align-items:center;gap:5px;padding:10px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);transition:all .2s;white-space:nowrap;user-select:none}
.repeat-toggle.active{background:var(--repeat-bg);border-color:var(--repeat-color);color:var(--repeat-color)}
.btn-add{flex:0 0 42px;height:42px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s}
.btn-add:hover{background:var(--accent-mid)}
.btn-add:active{transform:scale(.93)}

/* Recurring banner */
.recurring-banner{background:var(--repeat-bg);border:1px solid #c8d0e8;border-radius:var(--radius);padding:13px 18px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--repeat-color)}

/* Category filter chips */
.cat-filter-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding:0 2px}
.cat-chip{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .2s;user-select:none;display:flex;align-items:center;gap:5px}
.cat-chip.all-chip{background:var(--bg);border-color:var(--border);color:var(--text-muted)}
.cat-chip.all-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Tasks header */
.tasks-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
.tasks-label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn-manage-recurring{font-size:11px;font-weight:500;color:var(--repeat-color);background:var(--repeat-bg);border:1px solid #c8d0e8;cursor:pointer;padding:4px 10px;border-radius:6px;transition:all .2s}
.btn-manage-recurring:hover{background:#dde3f2}
.btn-clear-done{font-size:11px;font-weight:500;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .2s,background .2s}
.btn-clear-done:hover{color:var(--danger);background:#fdf2ef}

/* Category group headers */
.cat-group-header{display:flex;align-items:center;gap:8px;margin:18px 0 8px;padding:0 2px}
.cat-group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-group-name{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.cat-group-count{font-size:11px;color:var(--text-muted);margin-left:2px}
.cat-group-line{flex:1;height:1px;background:var(--border)}

/* Task list */
.task-list{display:flex;flex-direction:column;gap:6px}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,border-color .2s,opacity .4s,background .3s;animation:slideIn .35s cubic-bezier(.16,1,.3,1) both;position:relative}
.task-item:hover{box-shadow:var(--shadow-md);border-color:#dbd9d3}
.task-item.done{background:var(--surface-hover);border-color:var(--border-light);box-shadow:none;opacity:.6}
.task-item.is-recurring{/* left accent via cat color */}

/* Category color left border - applied inline via style */
.task-cat-bar{width:3px;height:100%;position:absolute;left:0;top:0;border-radius:var(--radius) 0 0 var(--radius)}

.task-check{width:21px;height:21px;flex-shrink:0;appearance:none;-webkit-appearance:none;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;display:grid;place-items:center;transition:all .2s cubic-bezier(.16,1,.3,1);position:relative}
.task-check:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.task-check:checked{background:var(--accent);border-color:var(--accent);animation:checkPop .3s cubic-bezier(.16,1,.3,1)}
.task-check:checked::after{content:'';width:5px;height:9px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-1px);display:block}
.task-time{font-size:12px;font-weight:600;color:var(--accent-mid);letter-spacing:.04em;flex-shrink:0;min-width:42px;font-variant-numeric:tabular-nums;transition:color .3s}
.task-item.done .task-time{color:var(--text-muted)}
.task-divider{width:1px;height:16px;background:var(--border);flex-shrink:0}
.task-text{flex:1;font-size:14px;color:var(--text-primary);line-height:1.4;transition:all .3s ease}
.task-item.done .task-text{text-decoration:line-through;color:var(--text-muted)}
.task-badges{display:flex;gap:5px;flex-shrink:0;align-items:center}
.recurring-badge{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--repeat-color);background:var(--repeat-bg);padding:2px 7px;border-radius:99px;border:1px solid #c8d0e8}
.cat-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:.04em}
.btn-delete{opacity:0;width:26px;height:26px;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--text-muted);font-size:13px;display:flex;align-items:center;justify-content:center;transition:opacity .2s,background .2s,color .2s;flex-shrink:0}
.task-item:hover .btn-delete{opacity:1}
.btn-delete:hover{background:#fdf2ef;color:var(--danger)}

/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:14px;line-height:1.6}

/* ── CALENDAR TAB ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-month-title{font-family:'Nanum Gothic',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.01em}
.cal-month-title em{font-style:normal;color:var(--accent-mid)}
.cal-nav-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;font-size:16px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-nav-btn:hover{border-color:var(--accent-mid);color:var(--accent)}
.cal-grid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:24px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);border-bottom:1px solid var(--border)}
.cal-dow{text-align:center;padding:10px 4px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.cal-dow:first-child{color:#c45454}
.cal-dow:last-child{color:var(--repeat-color)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:70px;padding:7px 5px;border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.empty{background:var(--bg);opacity:.4}
.cal-cell.has-data:hover{background:#f4f3f0}
.cal-date-num{font-size:12px;font-weight:500;color:var(--text-muted);line-height:1;align-self:flex-start;padding:0 2px}
.cal-cell.today .cal-date-num{background:var(--accent);color:#fff;border-radius:99px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:600}
.cal-cell.sun .cal-date-num{color:#c45454}
.cal-cell.sat .cal-date-num{color:var(--repeat-color)}
.cal-cell.today .cal-date-num{color:#fff!important}
.cal-pct-pill{font-size:11px;font-weight:700;line-height:1}
.cal-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%}
.cal-mini-bar{width:80%;height:4px;background:var(--progress-bg);border-radius:99px;overflow:hidden}
.cal-mini-bar-fill{height:100%;border-radius:99px}
.tier-0{background:var(--border)}
.tier-lo{background:#e8c98a}
.tier-mid{background:var(--accent-mid)}
.tier-hi{background:var(--accent)}
.tier-100{background:#2d5a3d}
.pct-lo{color:#b08020}
.pct-mid{color:var(--accent-mid)}
.pct-hi{color:var(--accent)}
.pct-100{color:var(--accent)}
.cal-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow-sm);margin-bottom:24px}
.cal-summary-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.cal-summary-title{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.cal-summary-avg{display:flex;align-items:baseline;gap:3px}
.cal-avg-num{font-family:'Nanum Gothic',sans-serif;font-size:26px;font-weight:800;color:var(--accent);line-height:1}
.cal-avg-sym{font-size:14px;color:var(--accent-mid);font-weight:500}
.cal-avg-label{font-size:11px;color:var(--text-muted);margin-left:6px}
.task-stats-section{}
.task-stats-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;padding:0 4px}
.task-stat-list{display:flex;flex-direction:column;gap:10px}
.task-stat-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-sm);border-left:3px solid var(--border)}
.task-stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:12px}
.task-stat-name{font-size:14px;font-weight:500;color:var(--text-primary);flex:1}
.task-stat-cat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;flex-shrink:0}
.task-stat-nums{display:flex;align-items:baseline;gap:3px;flex-shrink:0}
.task-stat-pct{font-family:'Nanum Gothic',sans-serif;font-size:20px;font-weight:800;line-height:1;color:var(--accent)}
.task-stat-pct-sym{font-size:12px;color:var(--accent-mid)}
.task-stat-days{font-size:11px;color:var(--text-muted);margin-left:5px}
.task-stat-bar-wrap{height:5px;background:var(--progress-bg);border-radius:99px;overflow:hidden}
.task-stat-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-mid),var(--accent));transition:width .6s cubic-bezier(.16,1,.3,1)}
.task-stat-empty{text-align:center;padding:36px 20px;font-size:13px;color:var(--text-muted);line-height:1.6}

/* ── CATEGORIES TAB ── */
.cat-tab-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cat-tab-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.btn-add-cat{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:background .2s}
.btn-add-cat:hover{background:var(--accent-mid)}
.cat-grid{display:flex;flex-direction:column;gap:8px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);animation:slideIn .3s ease both}
.cat-card-swatch{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.08)}
.cat-card-name{flex:1;font-size:14px;font-weight:500}
.cat-card-count{font-size:12px;color:var(--text-muted)}
.cat-card-actions{display:flex;gap:4px}
.btn-cat-edit,.btn-cat-delete{width:28px;height:28px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .2s}
.btn-cat-edit:hover{background:var(--bg);color:var(--text-primary)}
.btn-cat-delete:hover{background:#fdf2ef;color:var(--danger)}
.cat-empty{text-align:center;padding:48px 20px;color:var(--text-muted)}
.cat-empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.cat-empty-text{font-size:14px;line-height:1.6}

/* Color palette picker */
.color-palette{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.12)}
.color-swatch.selected{border-color:#1a1a1a;transform:scale(1.1)}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:440px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(16px);transition:transform .3s cubic-bezier(.16,1,.3,1);max-height:85vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px}
.modal-close{width:32px;height:32px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background .2s}
.modal-close:hover{background:var(--border)}
.modal-field{margin-bottom:16px}
.modal-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;display:block}
.modal-input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-primary);outline:none;transition:border-color .2s}
.modal-input:focus{border-color:var(--accent-mid)}
.modal-desc{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6}
.modal-footer{display:flex;gap:8px;margin-top:20px}
.btn-modal-primary{flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:background .2s}
.btn-modal-primary:hover{background:var(--accent-mid)}
.btn-modal-cancel{padding:12px 20px;background:var(--bg);color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;transition:all .2s}
.btn-modal-cancel:hover{border-color:var(--text-muted);color:var(--text-primary)}
.recurring-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.recurring-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
.recurring-item .r-time{font-size:12px;font-weight:600;color:var(--repeat-color);min-width:44px;font-variant-numeric:tabular-nums}
.recurring-item .r-text{flex:1;font-size:14px}
.btn-remove-recurring{width:26px;height:26px;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--text-muted);font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
.btn-remove-recurring:hover{background:#fdf2ef;color:var(--danger)}
.modal-empty{text-align:center;padding:32px 20px;color:var(--text-muted);font-size:13px;line-height:1.6}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes removeOut{to{opacity:0;transform:translateX(10px);max-height:0;padding:0;margin:0}}
.removing{animation:removeOut .3s ease forwards;pointer-events:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="date-label">오늘의 일정</div>
    <div class="date-display"><em id="dayName"></em> <span id="dateText"></span></div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="today">📋 오늘</button>
    <button class="tab-btn" data-tab="calendar">📅 월별</button>
    <button class="tab-btn" data-tab="categories">🏷️ 카테고리</button>
  </div>

  <!-- ══ TODAY ══ -->
  <div class="tab-panel active" id="tab-today">

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">오늘 진행률</span>
        <div class="progress-stats">
          <span class="progress-pct" id="progressPct">0</span>
          <span class="progress-pct-sym">%</span>
          <span class="progress-count" id="progressCount">0 / 0</span>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    </div>

    <div class="add-form">
      <div class="form-title">새 할 일 추가</div>
      <div class="form-row">
        <input type="time" class="input-time" id="inputTime">
        <input type="text" class="input-task" id="inputTask" placeholder="무엇을 할 예정인가요?" maxlength="80">
      </div>
      <div class="form-row-2">
        <div class="cat-select-wrap" style="flex:1">
          <select class="cat-select" id="inputCat" style="width:100%">
            <option value="">카테고리 없음</option>
          </select>
          <span class="cat-select-arrow">▼</span>
        </div>
        <button class="repeat-toggle" id="repeatToggle"><span>🔁</span><span>반복</span></button>
        <button class="btn-add" id="btnAdd">＋</button>
      </div>
    </div>

    <div class="recurring-banner" id="recurringBanner" style="display:none">
      <span style="font-size:16px;flex-shrink:0">🔁</span>
      <span id="bannerText"></span>
    </div>

    <!-- Category filter chips -->
    <div class="cat-filter-wrap" id="catFilterWrap">
      <span class="cat-chip all-chip active" data-cat="">전체</span>
    </div>

    <div class="tasks-header">
      <span class="tasks-label">할 일 목록</span>
      <div class="header-actions">
        <button class="btn-manage-recurring" id="btnManageRecurring">🔁 반복 관리</button>
        <button class="btn-clear-done" id="btnClearDone">완료 지우기</button>
      </div>
    </div>
    <div class="task-list" id="taskList"></div>

  </div>

  <!-- ══ CALENDAR ══ -->
  <div class="tab-panel" id="tab-calendar">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="calPrev">‹</button>
      <div class="cal-month-title" id="calMonthTitle"></div>
      <button class="cal-nav-btn" id="calNext">›</button>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-dow-row">
        <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div>
        <div class="cal-dow">토</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="cal-summary">
      <div class="cal-summary-header">
        <span class="cal-summary-title">이번 달 평균 달성률</span>
        <div class="cal-summary-avg">
          <span class="cal-avg-num" id="calAvgNum">—</span>
          <span class="cal-avg-sym" id="calAvgSym"></span>
          <span class="cal-avg-label" id="calAvgLabel"></span>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="calAvgBar" style="width:0%"></div></div>
    </div>
    <div class="task-stats-section">
      <div class="task-stats-title">항목별 달성률</div>
      <div class="task-stat-list" id="taskStatList"></div>
    </div>
  </div>

  <!-- ══ CATEGORIES ══ -->
  <div class="tab-panel" id="tab-categories">
    <div class="cat-tab-header">
      <span class="cat-tab-title">카테고리 목록</span>
      <button class="btn-add-cat" id="btnAddCat">＋ 카테고리 추가</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

</div>

<!-- Recurring Modal -->
<div class="modal-overlay" id="modalRecurring">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">반복 일정 관리</span>
      <button class="modal-close" onclick="closeModal('modalRecurring')">✕</button>
    </div>
    <p class="modal-desc">앱을 열 때마다 오늘 목록에 자동으로 추가되는 일정이에요.</p>
    <div class="recurring-list" id="recurringList"></div>
    <button class="btn-modal-primary" onclick="closeModal('modalRecurring')">닫기</button>
  </div>
</div>

<!-- Category Edit Modal -->
<div class="modal-overlay" id="modalCat">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalCatTitle">카테고리 추가</span>
      <button class="modal-close" onclick="closeModal('modalCat')">✕</button>
    </div>
    <div class="modal-field">
      <label class="modal-label">카테고리 이름</label>
      <input type="text" class="modal-input" id="catNameInput" placeholder="예: 운동, 공부, 업무…" maxlength="20">
    </div>
    <div class="modal-field">
      <label class="modal-label">색상 선택</label>
      <div class="color-palette" id="colorPalette"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal('modalCat')">취소</button>
      <button class="btn-modal-primary" id="btnSaveCat">저장</button>
    </div>
  </div>
</div>

<script>
// ── Storage ───────────────────────────────
const TASKS_KEY     = 'dcl_v4_tasks';
const RECURRING_KEY = 'dcl_v4_recurring';
const LAST_DATE_KEY = 'dcl_v4_lastdate';
const HISTORY_KEY   = 'dcl_v4_history';
const CATS_KEY      = 'dcl_v4_cats';

// ── State ─────────────────────────────────
let tasks     = [];
let recurring = [];
let history   = {};
let categories= []; // [{id, name, color}]
let isRepeat  = false;
let activeFilter = ''; // '' = all, else catId
let editingCatId = null; // null = new
let selectedColor = '';

const now0 = new Date();
let calYear  = now0.getFullYear();
let calMonth = now0.getMonth();

// ── Preset color palette (12 colors) ─────
const PRESET_COLORS = [
  '#E05C5C', // red
  '#E07B3A', // orange
  '#D4B200', // yellow
  '#4A8760', // green
  '#3A82C4', // blue
  '#5A6FA8', // indigo
  '#8B5BB8', // violet
  '#C45454', // crimson
  '#26A69A', // teal
  '#E67E87', // pink
  '#7B9E5A', // lime green
  '#8D6E63', // brown
];

// ── Utilities ─────────────────────────────
function todayStr() {
  const d = new Date();
  return dateStr(d.getFullYear(), d.getMonth()+1, d.getDate());
}
function dateStr(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Cat helpers ───────────────────────────
function getCat(id){ return categories.find(c=>c.id===id)||null; }

function catStyle(catId){
  const c = getCat(catId);
  if(!c) return {color:'#a8a49c',bg:'#f0eeea',hex:'#a8a49c'};
  return { color: c.color, bg: hexToAlpha(c.color, .12), hex: c.color };
}

function hexToAlpha(hex, a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Persist ───────────────────────────────
function saveTasks()   { localStorage.setItem(TASKS_KEY,     JSON.stringify(tasks)); }
function saveRecurring(){ localStorage.setItem(RECURRING_KEY, JSON.stringify(recurring)); }
function saveHistory() { localStorage.setItem(HISTORY_KEY,   JSON.stringify(history)); }
function saveCats()    { localStorage.setItem(CATS_KEY,      JSON.stringify(categories)); }

function load(){
  try{ tasks      = JSON.parse(localStorage.getItem(TASKS_KEY))     ||[]; }catch{ tasks=[]; }
  try{ recurring  = JSON.parse(localStorage.getItem(RECURRING_KEY)) ||[]; }catch{ recurring=[]; }
  try{ history    = JSON.parse(localStorage.getItem(HISTORY_KEY))   ||{}; }catch{ history={}; }
  try{ categories = JSON.parse(localStorage.getItem(CATS_KEY))      ||[]; }catch{ categories=[]; }
}

// ── Snapshot ──────────────────────────────
function snapshotToday(){
  const key=todayStr(), total=tasks.length, done=tasks.filter(t=>t.done).length;
  const pct = total===0?null:Math.round((done/total)*100);
  const items= tasks.filter(t=>t.recurringId).map(t=>({text:t.text,rid:t.recurringId,done:t.done,catId:t.catId||''}));
  history[key]={pct,done,total,items};
  saveHistory();
}

// ── New day injection ─────────────────────
function injectRecurringIfNewDay(){
  const today=todayStr(), lastDate=localStorage.getItem(LAST_DATE_KEY);
  if(lastDate===today) return 0;
  if(lastDate&&tasks.length>0) snapshotToday();
  tasks.forEach(t=>{t.done=false;});
  let added=0;
  recurring.forEach(r=>{
    const exists=tasks.some(t=>t.recurringId===r.id);
    if(!exists){ tasks.push({id:uid(),time:r.time,text:r.text,done:false,recurringId:r.id,catId:r.catId||''}); added++; }
  });
  saveTasks();
  localStorage.setItem(LAST_DATE_KEY, today);
  return added;
}

// ── Date display ──────────────────────────
function renderDate(){
  const n=new Date();
  const days=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('dayName').textContent=days[n.getDay()];
  document.getElementById('dateText').textContent=`${n.getFullYear()}년 ${months[n.getMonth()]} ${n.getDate()}일`;
}

// ── Category selector in form ─────────────
function populateCatSelect(){
  const sel=document.getElementById('inputCat');
  const prev=sel.value;
  sel.innerHTML='<option value="">카테고리 없음</option>';
  categories.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.id; o.textContent=c.name; sel.appendChild(o);
  });
  sel.value=prev||'';
  // color the select border to match selected
  updateCatSelectColor();
}

function updateCatSelectColor(){
  const sel=document.getElementById('inputCat');
  const wrap=sel.closest('.cat-select-wrap');
  const catId=sel.value;
  if(catId){
    const c=getCat(catId);
    if(c){ sel.style.borderColor=c.color; sel.style.fontWeight='600'; sel.style.color=c.color; return; }
  }
  sel.style.borderColor=''; sel.style.fontWeight=''; sel.style.color='';
}

// ── Filter chips ──────────────────────────
function renderFilterChips(){
  const wrap=document.getElementById('catFilterWrap');
  wrap.innerHTML='';
  const allChip=document.createElement('span');
  allChip.className='cat-chip all-chip'+(activeFilter===''?' active':'');
  allChip.dataset.cat=''; allChip.textContent='전체';
  allChip.onclick=()=>{ activeFilter=''; renderFilterChips(); renderTasks(); };
  wrap.appendChild(allChip);

  categories.forEach(c=>{
    const chip=document.createElement('span');
    chip.className='cat-chip';
    const isActive=activeFilter===c.id;
    chip.style.background=isActive?c.color:hexToAlpha(c.color,.12);
    chip.style.borderColor=c.color;
    chip.style.color=isActive?'#fff':c.color;
    chip.textContent=c.name;
    chip.dataset.cat=c.id;
    chip.onclick=()=>{ activeFilter=c.id; renderFilterChips(); renderTasks(); };
    wrap.appendChild(chip);
  });
}

// ── Progress ──────────────────────────────
function updateProgress(){
  const total=tasks.length, done=tasks.filter(t=>t.done).length;
  const pct=total===0?0:Math.round((done/total)*100);
  document.getElementById('progressPct').textContent=pct;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressCount').textContent=`${done} / ${total}`;
}

// ── Render tasks ──────────────────────────
function renderTasks(){
  const list=document.getElementById('taskList');
  let filtered=activeFilter ? tasks.filter(t=>t.catId===activeFilter) : tasks;

  if(filtered.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">아직 등록된 할 일이 없어요.<br>위에서 새 일정을 추가해 보세요.</div></div>`;
    updateProgress(); return;
  }

  // Group by category
  const groups = {};
  const noCatKey = '__none__';
  filtered.forEach(t=>{
    const key = t.catId||noCatKey;
    if(!groups[key]) groups[key]=[];
    groups[key].push(t);
  });

  // Sort each group by time
  const sortByTime = arr => arr.sort((a,b)=>{
    if(!a.time&&!b.time) return 0; if(!a.time) return 1; if(!b.time) return -1;
    return a.time.localeCompare(b.time);
  });

  // Build order: categories in order, then no-cat
  const orderedKeys = [
    ...categories.map(c=>c.id).filter(id=>groups[id]),
    ...(groups[noCatKey]?[noCatKey]:[])
  ];

  let html='';
  orderedKeys.forEach(key=>{
    const items = sortByTime(groups[key]);
    const cat = getCat(key);
    if(cat){
      html+=`<div class="cat-group-header">
        <div class="cat-group-dot" style="background:${cat.color}"></div>
        <span class="cat-group-name" style="color:${cat.color}">${escapeHtml(cat.name)}</span>
        <span class="cat-group-count">${items.length}개</span>
        <div class="cat-group-line"></div>
      </div>`;
    } else if(orderedKeys.length>1||(categories.length>0)){
      html+=`<div class="cat-group-header">
        <div class="cat-group-dot" style="background:var(--border)"></div>
        <span class="cat-group-name" style="color:var(--text-muted)">미분류</span>
        <span class="cat-group-count">${items.length}개</span>
        <div class="cat-group-line"></div>
      </div>`;
    }

    items.forEach(task=>{
      const cs=catStyle(task.catId);
      html+=`
        <div class="task-item ${task.done?'done':''}" data-id="${task.id}" style="border-left:3px solid ${cs.hex}">
          <input type="checkbox" class="task-check" ${task.done?'checked':''}
                 onchange="toggleTask('${task.id}',this.checked)">
          ${task.time?`<span class="task-time">${task.time}</span><div class="task-divider"></div>`:''}
          <span class="task-text">${escapeHtml(task.text)}</span>
          <div class="task-badges">
            ${task.recurringId?`<span class="recurring-badge">반복</span>`:''}
          </div>
          <button class="btn-delete" onclick="deleteTask('${task.id}')" title="삭제">✕</button>
        </div>`;
    });
  });

  list.innerHTML=html;
  updateProgress();
}

// ── Render categories tab ─────────────────
function renderCatGrid(){
  const grid=document.getElementById('catGrid');
  if(categories.length===0){
    grid.innerHTML=`<div class="cat-empty"><div class="cat-empty-icon">🏷️</div><div class="cat-empty-text">아직 카테고리가 없어요.<br>오른쪽 버튼으로 추가해보세요!</div></div>`;
    return;
  }
  grid.innerHTML=categories.map(c=>{
    const taskCount=tasks.filter(t=>t.catId===c.id).length;
    return `
      <div class="cat-card" data-cid="${c.id}">
        <div class="cat-card-swatch" style="background:${c.color}"></div>
        <span class="cat-card-name">${escapeHtml(c.name)}</span>
        <span class="cat-card-count">${taskCount}개</span>
        <div class="cat-card-actions">
          <button class="btn-cat-edit" onclick="openEditCat('${c.id}')" title="수정">✏️</button>
          <button class="btn-cat-delete" onclick="deleteCat('${c.id}')" title="삭제">✕</button>
        </div>
      </div>`;
  }).join('');
}

// ── Color palette ─────────────────────────
function renderColorPalette(){
  const wrap=document.getElementById('colorPalette');
  wrap.innerHTML=PRESET_COLORS.map(hex=>`
    <div class="color-swatch ${selectedColor===hex?'selected':''}"
         style="background:${hex}"
         onclick="selectColor('${hex}')"></div>
  `).join('');
}

function selectColor(hex){
  selectedColor=hex;
  renderColorPalette();
}

// ── Category CRUD ─────────────────────────
function openAddCat(){
  editingCatId=null;
  selectedColor=PRESET_COLORS[Math.floor(Math.random()*PRESET_COLORS.length)];
  document.getElementById('catNameInput').value='';
  document.getElementById('modalCatTitle').textContent='카테고리 추가';
  renderColorPalette();
  openModal('modalCat');
  setTimeout(()=>document.getElementById('catNameInput').focus(),300);
}

function openEditCat(id){
  const c=getCat(id); if(!c) return;
  editingCatId=id;
  selectedColor=c.color;
  document.getElementById('catNameInput').value=c.name;
  document.getElementById('modalCatTitle').textContent='카테고리 수정';
  renderColorPalette();
  openModal('modalCat');
}

function saveCat(){
  const name=document.getElementById('catNameInput').value.trim();
  if(!name){ document.getElementById('catNameInput').focus(); return; }
  if(!selectedColor) selectedColor=PRESET_COLORS[0];

  if(editingCatId){
    const c=getCat(editingCatId);
    if(c){ c.name=name; c.color=selectedColor; }
  } else {
    categories.push({id:uid(),name,color:selectedColor});
  }
  saveCats();
  closeModal('modalCat');
  populateCatSelect();
  renderFilterChips();
  renderCatGrid();
  renderTasks();
}

function deleteCat(id){
  if(!confirm('카테고리를 삭제하면 해당 항목들의 분류가 해제돼요. 계속할까요?')) return;
  categories=categories.filter(c=>c.id!==id);
  tasks.forEach(t=>{ if(t.catId===id) delete t.catId; });
  recurring.forEach(r=>{ if(r.catId===id) delete r.catId; });
  saveCats(); saveTasks(); saveRecurring();
  if(activeFilter===id) activeFilter='';
  populateCatSelect(); renderFilterChips(); renderCatGrid(); renderTasks();
}

// ── Calendar ──────────────────────────────
function pctTierClass(pct){
  if(pct===null) return 'tier-0';
  if(pct===100)  return 'tier-100';
  if(pct>=80)    return 'tier-hi';
  if(pct>=40)    return 'tier-mid';
  return 'tier-lo';
}
function pctColorClass(pct){
  if(pct===null) return '';
  if(pct===100)  return 'pct-100';
  if(pct>=80)    return 'pct-hi';
  if(pct>=40)    return 'pct-mid';
  return 'pct-lo';
}

function renderCalendar(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthTitle').innerHTML=`<em>${calYear}년</em> ${months[calMonth]}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayKey=todayStr();

  const liveHistory=Object.assign({},history);
  if(tasks.length>0){
    const total=tasks.length, done=tasks.filter(t=>t.done).length;
    liveHistory[todayKey]={pct:Math.round((done/total)*100),done,total,
      items:tasks.filter(t=>t.recurringId).map(t=>({text:t.text,rid:t.recurringId,done:t.done,catId:t.catId||''}))};
  }

  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=dateStr(calYear,calMonth+1,d);
    const snap=liveHistory[key];
    const pct=snap?snap.pct:null;
    const isToday=key===todayKey;
    const dow=new Date(calYear,calMonth,d).getDay();
    html+=`<div class="cal-cell ${dow===0?'sun':''} ${dow===6?'sat':''} ${isToday?'today':''} ${pct!==null?'has-data':''}">
      <span class="cal-date-num">${d}</span>
      ${pct!==null?`<div class="cal-dot-wrap">
        <span class="cal-pct-pill ${pctColorClass(pct)}">${pct}%</span>
        <div class="cal-mini-bar"><div class="cal-mini-bar-fill ${pctTierClass(pct)}" style="width:${pct}%"></div></div>
      </div>`:''}
    </div>`;
  }
  document.getElementById('calDays').innerHTML=html;

  // Monthly avg
  const snaps=[];
  for(let d=1;d<=daysInMonth;d++){
    const s=liveHistory[dateStr(calYear,calMonth+1,d)];
    if(s&&s.pct!==null) snaps.push(s.pct);
  }
  const avgEl=document.getElementById('calAvgNum'),symEl=document.getElementById('calAvgSym'),
        lblEl=document.getElementById('calAvgLabel'),barEl=document.getElementById('calAvgBar');
  if(snaps.length===0){ avgEl.textContent='—';symEl.textContent='';lblEl.textContent='기록 없음';barEl.style.width='0%'; }
  else{
    const avg=Math.round(snaps.reduce((a,b)=>a+b,0)/snaps.length);
    avgEl.textContent=avg; symEl.textContent='%'; lblEl.textContent=`(${snaps.length}일 기준)`; barEl.style.width=avg+'%';
  }
  renderTaskStats(liveHistory);
}

function renderTaskStats(liveHistory){
  const el=document.getElementById('taskStatList');
  const ridMap={};
  for(let d=1;d<=new Date(calYear,calMonth+1,0).getDate();d++){
    const snap=liveHistory[dateStr(calYear,calMonth+1,d)];
    if(!snap||!snap.items) continue;
    snap.items.forEach(item=>{
      if(!ridMap[item.rid]) ridMap[item.rid]={text:item.text,catId:item.catId||'',doneDays:0,totalDays:0};
      ridMap[item.rid].totalDays++;
      if(item.done) ridMap[item.rid].doneDays++;
    });
  }
  const stats=Object.values(ridMap);
  if(stats.length===0){
    el.innerHTML=`<div class="task-stat-empty">이번 달 반복 일정 데이터가 없어요.<br>반복 일정을 등록하고 체크해보세요! 🔁</div>`;
    return;
  }
  stats.sort((a,b)=>(b.doneDays/b.totalDays)-(a.doneDays/a.totalDays));
  el.innerHTML=stats.map(s=>{
    const pct=s.totalDays===0?0:Math.round((s.doneDays/s.totalDays)*100);
    const cs=catStyle(s.catId);
    const cat=getCat(s.catId);
    return `<div class="task-stat-item" style="border-left-color:${cs.hex}">
      <div class="task-stat-top">
        <span class="task-stat-name">${escapeHtml(s.text)}</span>
        ${cat?`<span class="task-stat-cat" style="background:${cs.bg};color:${cs.color}">${escapeHtml(cat.name)}</span>`:''}
        <div class="task-stat-nums">
          <span class="task-stat-pct">${pct}</span>
          <span class="task-stat-pct-sym">%</span>
          <span class="task-stat-days">${s.doneDays}/${s.totalDays}일</span>
        </div>
      </div>
      <div class="task-stat-bar-wrap"><div class="task-stat-bar-fill" style="width:${pct}%;background:${cs.color}"></div></div>
    </div>`;
  }).join('');
}

// ── Recurring modal ───────────────────────
function renderRecurringList(){
  const el=document.getElementById('recurringList');
  if(recurring.length===0){
    el.innerHTML=`<div class="modal-empty">등록된 반복 일정이 없어요.<br>🔁 <strong>반복</strong> 버튼을 켜서 등록해보세요.</div>`;
    return;
  }
  const sorted=[...recurring].sort((a,b)=>{
    if(!a.time&&!b.time) return 0; if(!a.time) return 1; if(!b.time) return -1;
    return a.time.localeCompare(b.time);
  });
  el.innerHTML=sorted.map(r=>{
    const cs=catStyle(r.catId);
    const cat=getCat(r.catId);
    return `<div class="recurring-item">
      ${r.time?`<span class="r-time">${r.time}</span>`:`<span class="r-time" style="color:var(--text-muted)">—</span>`}
      <span class="r-text" style="flex:1">${escapeHtml(r.text)}</span>
      ${cat?`<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:${cs.bg};color:${cs.color};flex-shrink:0">${escapeHtml(cat.name)}</span>`:''}
      <button class="btn-remove-recurring" onclick="removeRecurring('${r.id}')" title="반복 해제">✕</button>
    </div>`;
  }).join('');
}

// ── Task actions ──────────────────────────
function addTask(){
  const timeEl=document.getElementById('inputTime');
  const taskEl=document.getElementById('inputTask');
  const catEl=document.getElementById('inputCat');
  const text=taskEl.value.trim();
  if(!text){ taskEl.focus(); return; }

  const time=timeEl.value||'', catId=catEl.value||'';
  const newTask={id:uid(),time,text,done:false,catId};

  if(isRepeat){
    const recItem={id:uid(),time,text,catId};
    recurring.push(recItem); saveRecurring();
    newTask.recurringId=recItem.id;
  }
  tasks.push(newTask); saveTasks(); snapshotToday();
  renderTasks(); renderCatGrid();
  taskEl.value=''; taskEl.focus();
  if(isRepeat){ isRepeat=false; updateRepeatToggle(); }
}

function toggleTask(id,checked){
  const task=tasks.find(t=>t.id===id); if(!task) return;
  task.done=checked; saveTasks(); snapshotToday();
  const item=document.querySelector(`.task-item[data-id="${id}"]`);
  if(item) item.classList.toggle('done',checked);
  updateProgress();
}

function deleteTask(id){
  const item=document.querySelector(`.task-item[data-id="${id}"]`);
  if(item){ item.classList.add('removing');
    setTimeout(()=>{ tasks=tasks.filter(t=>t.id!==id); saveTasks(); snapshotToday(); renderTasks(); renderCatGrid(); },280); }
}

function clearDone(){
  const doneItems=document.querySelectorAll('.task-item.done');
  if(doneItems.length===0) return;
  doneItems.forEach(el=>el.classList.add('removing'));
  setTimeout(()=>{ tasks=tasks.filter(t=>!t.done); saveTasks(); snapshotToday(); renderTasks(); renderCatGrid(); },300);
}

function removeRecurring(rid){
  recurring=recurring.filter(r=>r.id!==rid); saveRecurring();
  tasks.forEach(t=>{ if(t.recurringId===rid) delete t.recurringId; }); saveTasks();
  renderRecurringList(); renderTasks();
}

function updateRepeatToggle(){
  document.getElementById('repeatToggle').classList.toggle('active',isRepeat);
}

// ── Modal helpers ─────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ── Event listeners ───────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const target=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+target).classList.add('active');
    if(target==='calendar') renderCalendar();
    if(target==='categories') renderCatGrid();
  });
});

document.getElementById('calPrev').addEventListener('click',()=>{
  calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar();
});
document.getElementById('calNext').addEventListener('click',()=>{
  calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar();
});

document.getElementById('btnAdd').addEventListener('click',addTask);
document.getElementById('inputTask').addEventListener('keydown',e=>{ if(e.key==='Enter') addTask(); });
document.getElementById('btnClearDone').addEventListener('click',clearDone);
document.getElementById('btnManageRecurring').addEventListener('click',()=>{ renderRecurringList(); openModal('modalRecurring'); });
document.getElementById('btnAddCat').addEventListener('click',openAddCat);
document.getElementById('btnSaveCat').addEventListener('click',saveCat);
document.getElementById('catNameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') saveCat(); });
document.getElementById('inputCat').addEventListener('change',updateCatSelectColor);

// Close modals on overlay click
['modalRecurring','modalCat'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(id); });
});

document.getElementById('repeatToggle').addEventListener('click',()=>{
  isRepeat=!isRepeat; updateRepeatToggle();
});

// ── Init ──────────────────────────────────
renderDate();
load();
const added=injectRecurringIfNewDay();
if(added>0){
  const banner=document.getElementById('recurringBanner');
  banner.style.display='flex';
  document.getElementById('bannerText').innerHTML=`<strong>${added}개</strong>의 반복 일정이 자동으로 추가됐어요.`;
}
populateCatSelect();
renderFilterChips();
renderTasks();
snapshotToday();
</script>
